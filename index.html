<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tic Tac Toe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c10;
  --surface:#14141c;
  --surface2:#1e1e2a;
  --border:#2a2a3a;
  --x-col:#ff4d6d;
  --o-col:#4cc9f0;
  --win-col:#ffd60a;
  --text:#f0f0f8;
  --muted:#6b6b8a;
  --radius:16px;
}
html,body{height:100%;overflow-x:hidden;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 16px;
}
.wrap{
  width:100%;max-width:420px;
  display:flex;flex-direction:column;align-items:center;gap:18px;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;line-height:1;text-align:center;}
.logo .x{color:var(--x-col);}
.logo .o{color:var(--o-col);}

.mode-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;width:100%;}
.mode-btn{flex:1;padding:12px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.mode-btn.on{background:var(--surface2);color:var(--text);}
.mode-btn:first-child{border-right:1px solid var(--border);}

.diff-row{display:flex;gap:8px;width:100%;}
.diff-btn{flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.diff-btn.on{background:var(--surface2);color:var(--text);border-color:#3a3a55;}

.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.score-panel{padding:16px 12px;text-align:center;position:relative;}
.score-panel:first-child{border-right:1px solid var(--border);}
.score-panel:last-child{border-left:1px solid var(--border);}
.score-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;}
.score-sym{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;}
.score-sym.x{color:var(--x-col);}
.score-sym.o{color:var(--o-col);}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1;}
.active-bar{position:absolute;bottom:0;left:12px;right:12px;height:3px;border-radius:2px 2px 0 0;background:transparent;transition:background 0.3s;}
.active-bar.x{background:var(--x-col);}
.active-bar.o{background:var(--o-col);}

.status{font-size:16px;font-weight:500;color:var(--muted);min-height:32px;text-align:center;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:6px;}
.status.win{color:var(--win-col);font-size:18px;}
.status.draw{color:var(--muted);}

/* BOARD — simple grid, NO overlay */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:320px;}
.cell{
  aspect-ratio:1;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px;
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s,transform 0.12s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.cell.empty:hover{background:var(--surface2);border-color:#3a3a55;transform:scale(1.04);}
.cell.empty:active{transform:scale(0.96);}
.cell.taken{cursor:default;}
.cell.x-cell{color:var(--x-col);}
.cell.o-cell{color:var(--o-col);}
.cell .sym{display:block;animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);line-height:1;}
@keyframes popIn{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.cell.winner{background:rgba(255,214,10,0.12);border-color:var(--win-col);animation:winPulse 0.45s ease;}
@keyframes winPulse{0%{transform:scale(1);}40%{transform:scale(1.1);}100%{transform:scale(1);}}

/* thinking dots inline in status */
.dots{display:inline-flex;gap:5px;align-items:center;}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--o-col);animation:blink 1s ease infinite;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;}50%{opacity:1;}}

.btn-row{display:flex;gap:10px;width:100%;}
.game-btn{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;}
.game-btn:hover{background:var(--surface2);color:var(--text);}
.game-btn.primary{background:var(--surface2);color:var(--text);border-color:#3a3a55;}
.draw-score{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo"><span class="x">X</span> vs <span class="o">O</span></div>

  <div class="mode-bar">
    <button class="mode-btn on" id="btn2p" onclick="setMode('2p')">👥 2 Player</button>
    <button class="mode-btn" id="btnAI" onclick="setMode('ai')">🤖 vs Computer</button>
  </div>

  <div class="diff-row" id="diffRow" style="display:none;">
    <button class="diff-btn" onclick="setDiff('easy',this)">😌 Easy</button>
    <button class="diff-btn on" onclick="setDiff('medium',this)">🧠 Medium</button>
    <button class="diff-btn" onclick="setDiff('hard',this)">💀 Impossible</button>
  </div>

  <div class="scoreboard">
    <div class="score-panel">
      <div class="score-label" id="lblX">Player X</div>
      <div class="score-sym x">X</div>
      <div class="score-num" id="scoreX">0</div>
      <div class="active-bar" id="barX"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;gap:4px;">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Draw</div>
      <div class="draw-score" id="scoreDraw">0</div>
    </div>
    <div class="score-panel">
      <div class="score-label" id="lblO">Player O</div>
      <div class="score-sym o">O</div>
      <div class="score-num" id="scoreO">0</div>
      <div class="active-bar" id="barO"></div>
    </div>
  </div>

  <div class="status" id="status">X ki baari — Player X</div>
  <div class="board" id="board"></div>

  <div class="btn-row">
    <button class="game-btn" onclick="resetScores()">🔄 Scores Reset</button>
    <button class="game-btn primary" onclick="newGame()">Naya Game ▶</button>
  </div>

</div>

<script>
var mode='2p', diff='medium';
var board=[], cur='X', gameOver=false, aiThinking=false;
var scores={X:0,O:0,D:0};
var WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function renderBoard(){
  var el=document.getElementById('board');
  el.innerHTML='';
  for(var i=0;i<9;i++){
    var v=board[i];
    var cell=document.createElement('div');
    if(v){
      cell.className='cell taken '+(v==='X'?'x-cell':'o-cell');
      cell.innerHTML='<span class="sym">'+v+'</span>';
    } else {
      cell.className='cell empty';
      // attach click only to empty cells when game is active
      (function(idx){
        cell.addEventListener('click',function(){ handleClick(idx); });
      })(i);
    }
    el.appendChild(cell);
  }
}

function handleClick(i){
  if(gameOver||board[i]||aiThinking) return;
  if(mode==='ai'&&cur==='O') return;
  doMove(i);
  if(!gameOver&&mode==='ai'&&cur==='O'){
    aiThinking=true;
    renderBoard(); // lock board
    document.getElementById('status').innerHTML=
      'Computer soch raha hai <span class="dots"><span></span><span></span><span></span></span>';
    document.getElementById('status').className='status';
    var delay=diff==='easy'?400:diff==='medium'?600:750;
    setTimeout(function(){
      var mv=getAIMove();
      aiThinking=false;
      doMove(mv);
    },delay);
  }
}

function doMove(i){
  board[i]=cur;
  var combo=checkWin(board,cur);
  if(combo){
    renderBoard();
    var cells=document.getElementById('board').children;
    for(var k=0;k<combo.length;k++) cells[combo[k]].classList.add('winner');
    gameOver=true;
    scores[cur]++;
    updateScores();
    var name=cur==='X'?'Player X':(mode==='ai'?'Computer':'Player O');
    setStatus('🏆 '+name+' jeet gaya!','win');
    updateBars();
    return;
  }
  var full=true;
  for(var j=0;j<9;j++){if(!board[j]){full=false;break;}}
  if(full){
    renderBoard();
    gameOver=true;
    scores.D++;
    updateScores();
    setStatus('🤝 Draw! Barabar raha','draw');
    updateBars();
    return;
  }
  cur=cur==='X'?'O':'X';
  renderBoard();
  updateBars();
  var who=cur==='X'?'Player X':(mode==='ai'?'Computer':'Player O');
  setStatus(cur+' ki baari — '+who,'');
}

function setStatus(txt,cls){
  var el=document.getElementById('status');
  el.textContent=txt;
  el.className='status'+(cls?' '+cls:'');
}

function updateBars(){
  var bx=document.getElementById('barX');
  var bo=document.getElementById('barO');
  bx.className='active-bar'+((!gameOver&&cur==='X')?' x':'');
  bo.className='active-bar'+((!gameOver&&cur==='O')?' o':'');
}

function checkWin(b,p){
  for(var i=0;i<WINS.length;i++){
    var w=WINS[i];
    if(b[w[0]]===p&&b[w[1]]===p&&b[w[2]]===p) return w;
  }
  return null;
}

function updateScores(){
  document.getElementById('scoreX').textContent=scores.X;
  document.getElementById('scoreO').textContent=scores.O;
  document.getElementById('scoreDraw').textContent=scores.D;
}

function resetScores(){scores={X:0,O:0,D:0};updateScores();newGame();}

function setMode(m){
  mode=m;
  document.getElementById('btn2p').className='mode-btn'+(m==='2p'?' on':'');
  document.getElementById('btnAI').className='mode-btn'+(m==='ai'?' on':'');
  document.getElementById('diffRow').style.display=m==='ai'?'flex':'none';
  document.getElementById('lblO').textContent=m==='ai'?'Computer':'Player O';
  newGame();
}

function setDiff(d,btn){
  diff=d;
  var btns=document.querySelectorAll('.diff-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('on');
  btn.classList.add('on');
  newGame();
}

function newGame(){
  board=Array(9).fill('');
  cur='X'; gameOver=false; aiThinking=false;
  renderBoard(); updateBars();
  setStatus('X ki baari — Player X','');
}

/* ── AI ── */
function getAIMove(){
  if(diff==='easy') return easyMove();
  if(diff==='medium') return mediumMove();
  return bestMove();
}

function easyMove(){
  var emp=[];
  for(var i=0;i<9;i++) if(!board[i]) emp.push(i);
  return emp[Math.floor(Math.random()*emp.length)];
}

function mediumMove(){
  var i;
  // win
  for(i=0;i<9;i++){if(!board[i]){board[i]='O';if(checkWin(board,'O')){board[i]='';return i;}board[i]='';}}
  // block
  for(i=0;i<9;i++){if(!board[i]){board[i]='X';if(checkWin(board,'X')){board[i]='';return i;}board[i]='';}}
  if(Math.random()<0.35) return easyMove();
  return bestMove();
}

function bestMove(){
  var best=-100,move=0;
  for(var i=0;i<9;i++){
    if(!board[i]){
      board[i]='O';
      var s=minimax(board,0,false,-100,100);
      board[i]='';
      if(s>best){best=s;move=i;}
    }
  }
  return move;
}

function minimax(b,depth,isMax,alpha,beta){
  if(checkWin(b,'O')) return 10-depth;
  if(checkWin(b,'X')) return depth-10;
  var hasEmpty=false;
  for(var i=0;i<9;i++){if(!b[i]){hasEmpty=true;break;}}
  if(!hasEmpty) return 0;
  var best,i,s;
  if(isMax){
    best=-100;
    for(i=0;i<9;i++){
      if(!b[i]){
        b[i]='O';s=minimax(b,depth+1,false,alpha,beta);b[i]='';
        if(s>best)best=s;if(best>alpha)alpha=best;if(beta<=alpha)break;
      }
    }
  } else {
    best=100;
    for(i=0;i<9;i++){
      if(!b[i]){
        b[i]='X';s=minimax(b,depth+1,true,alpha,beta);b[i]='';
        if(s<best)best=s;if(best<beta)beta=best;if(beta<=alpha)break;
      }
    }
  }
  return best;
}

newGame();
</script>
</body>
</html>
